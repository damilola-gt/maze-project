<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css-styling/order.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div class="order-header">
      <a class="header-logo" href="/html/index.html">🛍️ Maze Shop</a>
      <div class="order-header-middle">Delivery Details</div>
      <div>🔒</div>
    </div>

    <!-- FORM -->
    <div class="form-wrapper">
      <h2>Enter your delivery details</h2>

      <form id="order-form">
        <!-- NAME ROW -->
        <div class="form-row">
          <div class="form-group">
            <label for="first-name"
              >First Name <span class="required">*</span></label
            >
            <input
              class="js-first-name"
              id="first-name"
              type="text"
              placeholder="John"
            />
            <p class="js-display"></p>
          </div>
          <div class="form-group">
            <label for="last-name"
              >Last Name <span class="required">*</span></label
            >
            <input
              class="js-last-name"
              id="last-name"
              type="text"
              placeholder="Doe"
            />
            <p class="js-display1"></p>
          </div>
        </div>

        <!-- EMAIL & PHONE -->
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input
              class="js-email"
              id="email"
              type="email"
              placeholder="john@email.com"
            />
            <p class="js-display2"></p>
          </div>
          <div class="form-group">
            <label for="phone"
              >Phone Number <span class="required">*</span></label
            >
            <input
              class="js-phone"
              id="phone"
              type="tel"
              placeholder="+234 800 000 0000"
            />
            <p class="js-display3"></p>
          </div>
        </div>

        <hr />

        <!-- ADDRESS -->
        <div class="form-row full-width">
          <div class="form-group">
            <label for="address"
              >Street Address <span class="required">*</span></label
            >
            <input
              class="js-address"
              id="address"
              type="text"
              placeholder="123 Main Street"
            />
            <p class="js-display4"></p>
          </div>
        </div>

        <!-- CITY, STATE, ZIP -->
        <div class="form-row">
          <div class="form-group">
            <label for="city">City <span class="required">*</span></label>
            <input class="js-city" id="city" type="text" placeholder="Lagos" />
            <p class="js-display5"></p>
          </div>
          <div class="form-group">
            <label for="state">State <span class="required">*</span></label>
            <input
              class="js-state"
              id="state"
              type="text"
              placeholder="Lagos State"
            />
            <p class="js-display6"></p>
          </div>
          <div class="form-group">
            <label for="zip">ZIP Code</label>
            <input class="js-zip" id="zip" type="text" placeholder="100001" />
            <p class="js-display7"></p>
          </div>
        </div>

        <button class="submit-btn js-submit-btn" type="button">
          Confirm Order →
        </button>
      </form>
    </div>

    <script type="module" src="/scriptss/orderSummary.js"></script>
  </body>
</html>
