<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Maze Shop</title>
    <link rel="stylesheet" href="../css-styling/checkout.css" />
  </head>
  <body>
    <div class="checkout-header">
      <a class="header-logo" href="index.html">🛍️ Maze Shop</a>

      <div class="checkout-header-middle">
        Checkout (<span class="js-cart-item-count">0</span> items)
      </div>

      <div class="checkout-header-right">🔒</div>
    </div>

    <h3>Review your order</h3>
    <div class="container">
      <div class="grid-section">
        <div class="grid-items js-display"></div>

        <div class="js-order-summary">
          <div class="order-section">
            <p>Order summary</p>
            <div class="order-grid">
              <div class="left-side">
                <span class="left">items(3):</span>
                <span class="left"> shipping & handling: </span>
                <span class="left"> Total before tax:</span>
                <span class="left"> Estimated tax(10%): </span>
              </div>
              <div class="right-side">
                <span class="right"> $20.95</span>
                <span class="right"> $0.00</span>
                <span class="right"> $20.95</span>
                <span class="right">$2.10</span>
              </div>
            </div>
            <hr />

            <div>
              <span class="left">Order Total:</span>
              <span class="right-lane"> $20.95</span>
            </div>

            <div class="button-div">
              <button class="place-order">Place order</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../scriptss/checkout.js"></script>
    <script type="module" src="../scriptss/orderSummary.js"></script>
  </body>
</html>
